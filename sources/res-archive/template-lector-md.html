<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA_ARCHIVO_DOCTRINA</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        :root {
            --bg-ultra-dark: #f2f4f7;
            --bg-module: #ffffff;
            --accent-main: #e6003d;
            --accent-soft: #d1d5db;
            --accent-glow: #1a1a1a;
            --text-main: #4a4a4a;
            --font-mono: 'JetBrains Mono', monospace;
            --nav-width: 300px;
        }

/* --- ESTILOS DE ELEMENTOS MARKDOWN (THEME DOCTRINA) --- */
#markdown-content {
    flex-grow: 1;
    padding: 50px;
    overflow-y: auto;
    background: #ffffff;
    color: #2d2d2d;
    line-height: 1.7;
    max-width: 950px;
    margin: 0 auto;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
}

/* Encabezados con estética de terminal */
#markdown-content h1, 
#markdown-content h2, 
#markdown-content h3 {
    font-family: var(--font-mono);
    text-transform: uppercase;
    color: var(--accent-glow);
    border-left: 4px solid var(--accent-main);
    padding-left: 15px;
    margin-top: 1.5em;
    letter-spacing: -0.5px;
}

#markdown-content h1 { font-size: 1.8rem; border-bottom: 1px solid var(--accent-soft); padding-bottom: 10px; }
#markdown-content h2 { font-size: 1.4rem; }
#markdown-content h3 { font-size: 1.1rem; border-left-width: 2px; }

/* Párrafos y Énfasis */
#markdown-content p { margin-bottom: 1.2em; }
#markdown-content b, #markdown-content strong { color: var(--accent-main); font-weight: 700; }
#markdown-content i, #markdown-content em { color: #666; font-style: italic; }

/* Listas (ul / ol) */
#markdown-content ul, #markdown-content ol {
    padding-left: 25px;
    margin-bottom: 1.5em;
}

#markdown-content li { margin-bottom: 0.5em; }

#markdown-content ul li::marker {
    color: var(--accent-main);
    content: "› ";
    font-weight: bold;
}

/* Tablas Estilo Industrial */
#markdown-content table {
    width: 100%;
    border-collapse: collapse;
    margin: 2em 0;
    font-family: var(--font-mono);
    font-size: 0.85rem;
}

#markdown-content th {
    background: var(--accent-glow);
    color: white;
    text-transform: uppercase;
    padding: 12px;
    text-align: left;
    border: 1px solid var(--accent-glow);
}

#markdown-content td {
    padding: 10px;
    border: 1px solid var(--accent-soft);
}

#markdown-content tr:nth-child(even) {
    background: #f9f9f9;
}

#markdown-content tr:hover {
    background: rgba(230, 0, 61, 0.05);
}

/* Citas (Blockquotes) */
#markdown-content blockquote {
    margin: 2em 0;
    padding: 15px 25px;
    background: var(--bg-ultra-dark);
    border-left: 5px solid var(--accent-main);
    font-style: italic;
    color: #555;
}

/* Código en línea */
#markdown-content code {
    font-family: var(--font-mono);
    background: #eee;
    padding: 2px 6px;
    border-radius: 3px;
    font-size: 0.9em;
    color: var(--accent-main);
}
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.02) 50%),
                linear-gradient(90deg, rgba(255, 0, 0, 0.01), rgba(0, 255, 234, 0.01));
            background-size: 100% 4px, 4px 100%;
            pointer-events: none;
            z-index: 2000;
        }

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--bg-ultra-dark);
            color: var(--text-main);
            font-family: var(--font-mono);
            overflow: hidden;
        }

        /* --- SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-ultra-dark);
            border-left: 1px solid var(--accent-soft);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--accent-soft);
            border: 1px solid var(--accent-main);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent-main);
        }

        /* --- HEADER --- */
        header {
            height: 50px;
            background: var(--bg-ultra-dark);
            border-bottom: 2px solid var(--accent-main);
            display: flex;
            align-items: center;
            padding: 0 15px;
            justify-content: space-between;
            z-index: 1001;
            box-shadow: 0 2px 15px rgba(185, 28, 28, 0.2);
        }

        .menu-toggle {
            background: transparent;
            border: 1px solid var(--accent-main);
            color: var(--accent-main);
            padding: 5px 12px;
            cursor: pointer;
            font-family: var(--font-mono);
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .menu-toggle:hover {
            background: var(--accent-main);
            color: white;
            box-shadow: 0 0 15px var(--accent-main);
        }

        .main-container {
            display: flex;
            flex-grow: 1;
            height: calc(100vh - 50px);
            position: relative;
        }

        nav {
            width: var(--nav-width);
            min-width: var(--nav-width);
            background: var(--bg-module);
            border-right: 2px solid var(--accent-main);
            display: flex;
            flex-direction: column;
            padding: 15px;
            overflow-y: auto;
            transition: margin-left 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        nav.hidden {
            margin-left: calc(var(--nav-width) * -1 - 30px);
        }

        nav h3 {
            font-size: 14px;
            color: var(--accent-glow);
            border-bottom: 1px solid var(--accent-main);
            padding-bottom: 10px;
            letter-spacing: 2px;
        }

        .file-item {
            padding: 12px;
            border: 1px solid transparent;
            cursor: pointer;
            margin-bottom: 8px;
            font-size: 13px;
            color: var(--accent-glow);
            transition: 0.2s;
            background: rgba(0, 0, 0, 0.05);
        }

        .file-item:hover {
            border-color: var(--accent-glow);
            background: var(--accent-soft);
        }

        .file-item.active {
            background: var(--accent-main);
            border-left: 4px solid white;
            color: white;
            font-weight: bold;
        }

        /* --- VISUALIZADOR DE CONTENIDO --- */
        .viewer-area {
            flex-grow: 1;
            background: #fff;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        #markdown-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
            line-height: 1.6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Estilos para el MD renderizado */
        #markdown-content h1, #markdown-content h2 { 
            color: var(--accent-main); 
            border-bottom: 2px solid var(--accent-soft);
            padding-bottom: 10px;
        }
        
        #markdown-content code {
            background: #f0f0f0;
            padding: 2px 5px;
            font-family: var(--font-mono);
            font-size: 0.9em;
        }

        #overlay {
            display: none;
        }

        

        .header-controls {
            display: flex;
            gap: 5px;
        }

        .home-btn {
            border-color: var(--accent-glow) !important;
            color: var(--accent-glow) !important;
        }
    </style>
</head>

<body>

    <header>        
        <div class="header-controls">
            <button class="menu-toggle home-btn" onclick="location.href='../../index.html'">
                [ VOLVER ]
            </button>
            <button class="menu-toggle" onclick="toggleMenu()">
                [ ARCHIVOS ]
            </button>
        </div>
    </header>

    <div class="main-container">
        <div id="overlay" onclick="toggleMenu()"></div>

        <nav id="sidebar">
            <h3>ARCHIVE_INDEX</h3>
            <div class="file-item" onclick="loadMarkdown('../../assets/intro_derecho/test.md', this)">
                CADH_LEGISLACIÓN</div>
            <div class="file-item" onclick="loadMarkdown('../../posts/ejemplo/otro.md', this)">
                OTRO_DOCUMENTO</div>
        </nav>

        <main class="viewer-area">
            <div id="markdown-content">
                </div>

            <div id="fallback-container"
                style="display:none; padding: 20px; text-align: center; background: var(--bg-ultra-dark); width: 100%; border-top: 1px solid var(--accent-soft);">
                <a id="download-link" href="#" target="_blank" class="menu-toggle"
                    style="text-decoration: none; display: inline-block; font-size: 12px;">
                    [ VER_CÓDIGO_FUENTE_MD ]
                </a>
            </div>
        </main>
    </div>

    <script>
        function toggleMenu() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('hidden');
            if (window.innerWidth <= 768) {
                overlay.classList.toggle('active');
            }
        }

        /**
         * Carga un archivo Markdown desde una URL, lo convierte a HTML y lo muestra.
         * @param {string} url - Ruta relativa al archivo .md
         * @param {HTMLElement} element - El elemento del nav que fue clickeado
         */
        async function loadMarkdown(url, element) {
            const contentDiv = document.getElementById('markdown-content');
            const fallback = document.getElementById('fallback-container');
            const downloadLink = document.getElementById('download-link');
            
            contentDiv.innerHTML = "Cargando documento...";

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("No se pudo obtener el archivo.");
                
                const text = await response.text();
                
                // Conversión de Markdown a HTML
                contentDiv.innerHTML = marked.parse(text);
                
                downloadLink.href = url;
                fallback.style.display = 'block';

                // Gestión de estados activos en UI
                document.querySelectorAll('.file-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');

            } catch (error) {
                console.error("Error al cargar MD:", error);
                contentDiv.innerHTML = `<p style="color:var(--accent-main); text-align:center;">ERROR: ARCHIVO_NO_ENCONTRADO<br>${url}</p>`;
            }

            if (window.innerWidth <= 768) toggleMenu();
        }

        window.onload = () => {
            const firstItem = document.querySelector('.file-item');
            if (firstItem) {
                // Extraemos la URL del atributo onclick para la carga inicial
                const urlMatch = firstItem.getAttribute('onclick').match(/'([^']+)'/);
                if (urlMatch) loadMarkdown(urlMatch[1], firstItem);
            }
        };
    </script>
</body>

</html>
