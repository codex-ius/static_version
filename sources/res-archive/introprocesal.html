<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA_ARCHIVO_DOCTRINA</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        #markdown-content {
            /* ... tus estilos actuales ... */
            word-wrap: break-word;
        }

        #markdown-content table {
            display: table;
            /* Cambiamos de block a table para el layout fijo */
            table-layout: fixed;
            /* LA CLAVE: fuerza anchos iguales */
            width: 100%;
            border-collapse: collapse;
            margin: 2rem 0;
            word-wrap: break-word;
            /* Evita que el texto largo rompa la celda */
            overflow: hidden;
            /* Evita desbordes internos */
        }

        #markdown-content th,
        #markdown-content td {
            width: auto;
            /* El navegador las igualará automáticamente */
            padding: 12px;
            text-align: center;
            /* O left, según prefieras */
            word-break: break-word;
            /* Corta palabras largas para mantener el ancho */
        }
    </style>
</head>

<body>
    <nav>
        <div class="brand">CODEX<span>_IUS</span></div>
        <button class="home-btn" onclick="location.href='../../index.html'">
            [ VOLVER ]
        </button>
    </nav>
    <header>
        <h1>Introducción a Prácticas de Derecho Procesal:</h1>
    </header>

    <main>
        <details>
            <summary>[ ARCHIVOS ]</summary>
            <article>
                <h3>ARCHIVE_INDEX</h3>
                <button class="file-item" onclick="loadMarkdown('./docs/unidadI.md', this)">
                    UNIDAD_I</button>
            </article>
        </details>


        <div class="main-container">

            <div class="viewer-area">
                <div id="markdown-content">
                </div>
                <div id="fallback-container" style="display:none; padding: 20px; text-align: center; width: 100%;">
                    <a id="download-link" href="#" target="_blank"
                        style="text-decoration: none; display: inline-block; font-size: 12px;">
                        [ VER_CÓDIGO_FUENTE_MD ]
                    </a>
                </div>
    </main>
    <div id="theme">
        <button id="theme-toggle" class="btn-sys"></button>
    </div>
    <script>

        /**
         * Carga un archivo Markdown desde una URL, lo convierte a HTML y lo muestra.
         * @param {string} url - Ruta relativa al archivo .md
         * @param {HTMLElement} element - El elemento del nav que fue clickeado
         */
        async function loadMarkdown(url, element) {
            const contentDiv = document.getElementById('markdown-content');
            const fallback = document.getElementById('fallback-container');
            const downloadLink = document.getElementById('download-link');

            contentDiv.innerHTML = "Cargando documento...";

            try {
                const response = await fetch(url);
                if (!response.ok) throw new Error("No se pudo obtener el archivo.");

                const text = await response.text();

                // Conversión de Markdown a HTML
                contentDiv.innerHTML = marked.parse(text);

                downloadLink.href = url;
                fallback.style.display = 'block';

                // Gestión de estados activos en UI
                document.querySelectorAll('.file-item').forEach(item => item.classList.remove('active'));
                element.classList.add('active');

            } catch (error) {
                console.error("Error al cargar MD:", error);
                contentDiv.innerHTML = `<p style="text-align:center;">ERROR: ARCHIVO_NO_ENCONTRADO<br>${url}</p>`;
            }


        }

        window.onload = () => {
            const firstItem = document.querySelector('.file-item');
            if (firstItem) {
                // Extraemos la URL del atributo onclick para la carga inicial
                const urlMatch = firstItem.getAttribute('onclick').match(/'([^']+)'/);
                if (urlMatch) loadMarkdown(urlMatch[1], firstItem);
            }
        };

        // TEMA (Simplificado)
        const toggleBtn = document.getElementById('theme-toggle');
        const updateTheme = (t) => {
            document.documentElement.setAttribute('data-theme', t);
            localStorage.setItem('theme', t);
            if (toggleBtn) toggleBtn.textContent = `[ MODE: ${t.toUpperCase()} ]`;
        };
        updateTheme(localStorage.getItem('theme') || 'dark');

        if (toggleBtn) {
            toggleBtn.onclick = () => {
                const current = document.documentElement.getAttribute('data-theme');
                updateTheme(current === 'light' ? 'dark' : 'light');
            };
        }
    </script>
</body>

</html>
