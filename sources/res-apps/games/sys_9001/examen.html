<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA 9001 - JUICIO FINAL</title>
    <style>
        :root {
            --bg: #000;
            --panel: #050505;
            --accent: #ffffff;
            --critical: #ff0000;
            --text: #fff;
            --dim: #333;
        }

        * {
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid var(--dim);
            padding: 1rem;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }


        /* Cuando el tiempo es menor a 4, el borde se vuelve rojo */
        body.state-critical {
            border-color: var(--critical) !important;
            /* Opcional: un leve resplandor para aumentar la presión */
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.1);
        }

        /* Efecto Escáner */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        header {
            padding: 15px 30px;
            background: var(--panel);
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-panel {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 15px;
            background: #080808;
            border-bottom: 1px solid var(--dim);
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }

        .timer-container {
            width: 100%;
            height: 4px;
            background: #111;
        }

        #timer-bar {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: width 1s linear;
        }

        .main-display {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            text-align: center;
        }

        #ia-status {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        #question-text {
            font-size: 1.6rem;
            max-width: 850px;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 750px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--text);
            padding: 22px;
            font-size: 0.9rem;
            /*transition: 0.1s;*/
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--text);
            color: #000;
        }

        /* --- ESTILOS DEL RESULTADO (EL CARTEL QUE FALTA) --- */
        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .result-box {
            width: 100%;
            max-width: 500px;
            background: #050505;
            border: 1px solid var(--dim);
        }

        .result-header {
            background: #111;
            padding: 10px;
            font-size: 0.6rem;
            color: var(--dim);
            border-bottom: 1px solid var(--dim);
            text-align: center;
            letter-spacing: 2px;
        }

        .result-content {
            padding: 30px;
            text-align: center;
        }

        .res-data {
            text-align: left;
            font-size: 0.75rem;
            background: #080808;
            padding: 15px;
            border: 1px solid #111;
            margin: 20px 0;
            line-height: 1.8;
        }

        .text-success {
            color: #00ff00;
        }

        .text-fail {
            color: #ff0000;
        }

        .btn-terminal {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
        }

        .body-success {
            border-color: #00ff00;
        }

        .body-fail {
            border-color: var(--critical);
        }

        /* Estado de Éxito (Borde Verde) */
        body.state-success {
            border-color: #00ff00 !important;
            box-shadow: inset 0 0 15px rgba(0, 255, 0, 0.2);
        }

        /* Estado Crítico (Borde Rojo - Ya lo tenías, pero aseguremos el color) */
        body.state-critical {
            border-color: var(--critical) !important;
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.2);
        }

        /* Efecto Shake (Vibración de Error) */
        .fx-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        body {
            padding: 0;
            /* Eliminamos el padding para ganar espacio */
            border-width: 4px;
            /* Borde más fino para pantallas pequeñas */
        }

        header {
            padding: 10px 20px;
            font-size: 0.65rem;
            background: #000;
            border-bottom: 1px solid var(--dim);
        }

        /* HUD MONITOREO COMPACTO */
        .hud-monitor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #050505;
            border-bottom: 1px solid #111;
            min-height: 40px;
        }

        .hud-stats {
            display: flex;
            gap: 20px;
        }

        .hud-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .hud-label {
            font-size: 0.5rem;
            color: var(--dim);
        }

        .hud-value {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
        }

        #ia-status {
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50%;
        }

        /* ÁREA DE JUEGO ADAPTABLE */
        .main-display {
            flex: 1;
            padding: 20px;
            /* Reducido de 40px */
            justify-content: flex-start;
            /* Empieza desde arriba en móviles */
            margin-top: 20px;
        }

        #question-text {
            font-size: 1.2rem;
            /* Más pequeño para que quepa todo */
            margin-bottom: 25px;
            line-height: 1.3;
        }

        /* GRID RESPONSIVO */
        .options-grid {
            gap: 10px;
        }

        .btn {
            padding: 15px;
            /* Reducido para que quepan 4 botones en pantalla */
            font-size: 0.8rem;
        }

        /* MEDIA QUERIES PARA MÓVIL EXTREMO */
        @media (max-width: 480px) {
            body {
                border-width: 2px;
            }

            header {
                padding: 8px 12px;
            }

            .hud-monitor {
                padding: 5px 12px;
            }

            .hud-value {
                font-size: 1rem;
            }

            #question-text {
                font-size: 1rem;
            }

            .btn {
                padding: 12px;
                font-size: 0.75rem;
            }

            .hud-item:first-child {
                display: none;
            }

            /* Ocultamos Puntos en pantallas mini si es necesario */
        }
    </style>
    </style>
</head>

<body>
    <header>
        <div class="sys-brand">SYS_9001 // IA:TEST</div>
        <div id="q-count">PREGUNTA: 01/20</div>
    </header>

    <div class="hud-monitor">
        <div id="ia-status">ESPERANDO RESPUESTA...</div>
        <div class="hud-stats">
            <div class="hud-item">
                <span class="hud-label">PTS</span>
                <span id="current-score" class="hud-value">00</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">T-MIN</span>
                <span id="seconds" class="hud-value">10</span>
            </div>
        </div>
    </div>

    <div class="timer-container">
        <div id="timer-bar"></div>
    </div>

    <main class="main-display">
        <div id="question-text">Cargando...</div>
        <div id="options-container" class="options-grid"></div>
    </main>

    <div id="result-overlay">
        <div class="result-box">
            <div class="result-header">REPORTE_FINAL_SISTEMA_9001</div>
            <div class="result-content">
                <h1 id="res-status">ANALIZANDO...</h1>
                <div class="res-data">
                    <p>IDENTIFICACIÓN: <span id="res-id">POSTULANTE_9001</span></p>
                    <p>CALIFICACIÓN FINAL: <span id="res-score-value">00</span></p>
                    <p>ESTADO: <span id="res-sync">ERROR</span></p>
                </div>
                <div id="res-msg" style="font-size: 0.85rem; color: #888; margin-bottom: 25px;"></div>
                <button class="btn-terminal" onclick="location.href='index.html'">SALIR_DEL_SISTEMA</button>
            </div>
        </div>
    </div>

    <script>
        // 1. OBJETO ANALISTA (PARA EL REPORTE FINAL DE INVESTIGACIÓN)
        const Analista = {
            registrar(macro, micro, esCorrecto) {
                let stats = JSON.parse(localStorage.getItem('9001_HEATMAP')) || {};
                if (!stats[macro]) stats[macro] = {};
                if (!stats[macro][micro]) stats[macro][micro] = { ok: 0, err: 0 };

                if (esCorrecto) stats[macro][micro].ok++;
                else stats[macro][micro].err++;

                localStorage.setItem('9001_HEATMAP', JSON.stringify(stats));
            },

            obtenerReporte() {
                const stats = JSON.parse(localStorage.getItem('9001_HEATMAP')) || {};
                let secciones = [];
                for (const [macro, micros] of Object.entries(stats)) {
                    let persistentes = [];
                    let confort = [];
                    for (const [nombre, data] of Object.entries(micros)) {
                        if (data.err >= 3) persistentes.push(nombre);
                        if (data.ok >= 5 && data.err === 0) confort.push(nombre);
                    }
                    secciones.push(`${macro.toUpperCase()} | PERSISTENTE: ${persistentes.join(', ') || 'Ninguno'} | CONFORT: ${confort.join(', ') || 'Ninguno'}`);
                }
                return secciones.join(' || ') || "RESULTADO_UNICO";
            }
        };
        const SistemaPersistencia = {
            guardarPuntaje(categoria, puntaje) {
                try {
                    let historial = JSON.parse(localStorage.getItem(`9001_${categoria}`)) || [];
                    historial.push({
                        puntos: puntaje,
                        fecha: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                    historial.sort((a, b) => b.puntos - a.puntos);
                    historial = historial.slice(0, 5);
                    localStorage.setItem(`9001_${categoria}`, JSON.stringify(historial));
                } catch (e) {
                    console.error("Error en persistencia:", e);
                }
            }
        };

        const DB_LEGAL = {
            circunscripciones: {
                "1RA CIRCUNSCRIPCIÓN (CAPITAL)": ["Ciudad", "Las Heras", "Guaymallén", "Godoy Cruz", "Luján", "Lavalle"],
                "2DA CIRCUNSCRIPCIÓN (SUR)": ["San Rafael", "General Alvear", "Malargüe"],
                "3RA CIRCUNSCRIPCIÓN (ESTE)": ["San Martín", "Rivadavia", "Junín", "Santa Rosa", "La Paz"],
                "4TA CIRCUNSCRIPCIÓN (UCO)": ["Tunuyán", "Tupungato", "San Carlos"]
            },
            competencias: {
                "CIVIL Y COMERCIAL": [
                    "Responsabilidad civil (excede monto Art. 7)",
                    "Acciones reales y posesorias",
                    "Contratos civiles y comerciales (sin importar monto)",
                    "Sucesiones",
                    "Amparos",
                    "Consumo (excede monto Art. 7)"
                ],
                "PAZ LETRADO": [
                    "Desalojos (locación, comodato, usufructo)",
                    "Procesos de estructura monitoria",
                    "Responsabilidad civil (hasta monto Art. 7)",
                    "Consumo (hasta monto Art. 7)",
                    "Pequeñas causas (conflictos entre vecinos)"
                ]
            }
        };

      const Motores = {
    mazoCircun: [],
    mazosFuero: {},
    fuerosOrden: ["CIVIL Y COMERCIAL", "PAZ LETRADO"],

    prepararMazos() {
        if (this.mazoCircun.length === 0) {
            Object.entries(DB_LEGAL.circunscripciones).forEach(([llave, valores]) => {
                valores.forEach(v => this.mazoCircun.push({ valor: v, llave: llave }));
            });
            this.mazoCircun.sort(() => Math.random() - 0.5);
        }
        this.fuerosOrden.forEach(fuero => {
            if (!this.mazosFuero[fuero] || this.mazosFuero[fuero].length === 0) {
                this.mazosFuero[fuero] = [...DB_LEGAL.competencias[fuero]].sort(() => Math.random() - 0.5);
            }
        });
    },

    shuffle(array) { return array.sort(() => Math.random() - 0.5); },

    circunscripcion() {
        this.prepararMazos();
        if (this.mazoCircun.length < 2) this.mazoCircun = []; // Reinicio de seguridad

        const principal = this.mazoCircun.pop();
        const valor1 = principal.valor;
        const llaveC = principal.llave;
        const llavesTodas = Object.keys(DB_LEGAL.circunscripciones);

        const llavePregunta = llavesTodas[Math.floor(Math.random() * llavesTodas.length)];
        const secundario = this.mazoCircun[Math.floor(Math.random() * this.mazoCircun.length)] || principal;
        const valor2 = secundario.valor;
        const llaveV2 = secundario.llave;

        const v1Ok = (llaveC === llavePregunta);
        const v2Ok = (llaveV2 === llavePregunta);

        let a;
        if (v1Ok && v2Ok) a = "AMBOS SON CORRECTOS";
        else if (!v1Ok && !v2Ok) a = "NINGUNO ES CORRECTO";
        else if (v1Ok && !v2Ok) a = "SÓLO EL PRIMERO ES CORRECTO";
        else a = "SÓLO EL SEGUNDO ES CORRECTO";

        return {
            q: `¿Pertenecen ${valor1.toUpperCase()} y ${valor2.toUpperCase()} a la ${llavePregunta}?`,
            a: a,
            opts: ["AMBOS SON CORRECTOS", "NINGUNO ES CORRECTO", "SÓLO EL PRIMERO ES CORRECTO", "SÓLO EL SEGUNDO ES CORRECTO"],
            tipo: 'CIRCUNSCRIPCIÓN',
            subtipo: valor1
        };
    },

    competenciaMaterial() {
        this.prepararMazos();
        // En examen/preexamen, el fuero es aleatorio, no cíclico, para mayor dificultad
        const fueroActual = this.fuerosOrden[Math.floor(Math.random() * this.fuerosOrden.length)];
        
        if (this.mazosFuero[fueroActual].length === 0) {
            this.mazosFuero[fueroActual] = [...DB_LEGAL.competencias[fueroActual]].sort(() => Math.random() - 0.5);
        }

        const procesoCorrecto = this.mazosFuero[fueroActual].pop();
        
        const opts = this.shuffle([
            "CIVIL Y COMERCIAL", 
            "PAZ LETRADO", 
            "JUSTICIA DE FAMILIA", 
            "TRIBUTARIO Y CONCURSAL" // Se mantiene como distractor aunque no sea evaluado
        ]);

        return {
            q: `El proceso de ${procesoCorrecto.toUpperCase()} es competencia de:`,
            a: fueroActual,
            opts: opts,
            tipo: 'COMPETENCIA',
            subtipo: procesoCorrecto
        };
    }
};




const Examen = {
            score: 0,
            qIndex: 0,
            timeLeft: 10,
            timerInt: null,
            fallos: { "CIRCUNSCRIPCIÓN": 0, "COMPETENCIA": 0 },
            timestampStart: null,
            logPendiente: null,

            init() {
                this.timestampStart = new Date().toISOString();
                this.render();
            },

          render() {
    // 1. Control de finalización (Límite de 20 reactivos)
    if (this.qIndex >= 20) { this.finish(); return; }
    
    // 2. Reset del Timer de presión (10 segundos por pregunta)
    clearInterval(this.timerInt);
    this.timeLeft = 10;
    this.updateTimerUI();

    // 3. Selección de Desafío: Altera entre Circunscripción y Competencia
    // El motor interno ya gestiona la aleatoriedad de los modos (Ambos, Ninguno, Identificación)
    let desafio;
    if (this.qIndex % 2 === 0) {
        desafio = Motores.circunscripcion();
    } else {
        desafio = Motores.competenciaMaterial();
    }

    this.current = desafio;

    // 4. Actualización de Interfaz (DOM)
    document.getElementById('q-count').innerText = `PREGUNTA: ${String(this.qIndex + 1).padStart(2, '0')}/20`;
    document.getElementById('question-text').innerText = desafio.q;
    
    // Generación de botones dinámica
    document.getElementById('options-container').innerHTML = desafio.opts.map(o =>
        `<button class="btn" onclick="Examen.answer('${o}')">${o}</button>`
    ).join('');

    // 5. Reinicio de la cuenta regresiva
    this.startTimer();
},
            answer(val) {
                clearInterval(this.timerInt);
                const esCorrecto = (val === this.current.a);
                const body = document.body;
                body.classList.remove('state-critical', 'fx-shake', 'state-success');

                // REGISTRO SILENCIOSO DE ANALÍTICA
                if (val !== null) Analista.registrar(this.current.tipo, this.current.subtipo, esCorrecto);

                if (val === null) {
                    this.score -= 3;
                    this.fallos[this.current.tipo]++;
                    this.status("SILENCIO PENALIZADO (-3)", "var(--critical)");
                    body.classList.add('state-critical', 'fx-shake');
                } else if (esCorrecto) {
                    this.score += 1;
                    this.status("CORRECTO (+1)", "#00ff00");
                    body.classList.add('state-success');
                } else {
                    this.score -= 2;
                    this.fallos[this.current.tipo]++;
                    this.status("ERROR (-2)", "var(--critical)");
                    body.classList.add('state-critical', 'fx-shake');
                }

                document.getElementById('current-score').innerText = this.score;
                document.getElementById('options-container').innerHTML = "";
                this.qIndex++;
                setTimeout(() => {
                    body.classList.remove('fx-shake', 'state-success', 'state-critical');
                    this.render();
                }, 600);
            },

            startTimer() {
                this.timerInt = setInterval(() => {
                    this.timeLeft--;
                    this.updateTimerUI();
                    if (this.timeLeft <= 0) this.answer(null);
                }, 1000);
            },

            updateTimerUI() {
                const secondsLabel = document.getElementById('seconds');
                if (secondsLabel) secondsLabel.innerText = this.timeLeft;

                const bar = document.getElementById('timer-bar');
                if (bar) {
                    bar.style.width = (this.timeLeft * 10) + "%";
                    if (this.timeLeft < 4) {
                        bar.style.backgroundColor = "var(--critical)";
                        document.body.classList.add('state-critical');
                    } else {
                        bar.style.backgroundColor = "var(--accent)";
                        document.body.classList.remove('state-critical');
                    }
                }
            },

            status(msg, color) {
                const s = document.getElementById('ia-status');
                if (s) { s.innerText = msg; s.style.color = color; }
            },

            finish() {
                clearInterval(this.timerInt);
                const isApto = this.score >= 8;
                const reporteFull = Analista.obtenerReporte();

                // MEMORIA PARA MEG
                const memMEG = {
                    fecha: new Date().toISOString(),
                    score: this.score,
                    debilidad: reporteFull,
                    protocolo: 'EXAMEN_FINAL',
                    apto: isApto
                };
                localStorage.setItem('9001_MEG_MEMORY', JSON.stringify(memMEG));

                // LOG PARA INVESTIGACIÓN
                this.logPendiente = {
                    uid_hash: localStorage.getItem('meg_uid') || "ANON_USER",
                    session_token: localStorage.getItem('meg_session') || "NO_SESSION",
                    timestamp_start: this.timestampStart,
                    protocolo: 'EXAMEN_FINAL_9001',
                    score: this.score,
                    integridad: isApto ? 'ALTA' : 'INSUFICIENTE',
                    error_vector: reporteFull,
                    ua_client: navigator.userAgent
                };

                this.showResult(this.score, isApto, (this.fallos["CIRCUNSCRIPCIÓN"] >= this.fallos["COMPETENCIA"] ? "CIRCUNSCRIPCIÓN" : "COMPETENCIA"));
            },
            showResult(score, isApto, vector, session) {
                const overlay = document.getElementById('result-overlay');
                overlay.style.display = 'flex';
                document.getElementById('res-id').innerText = session;
                document.getElementById('res-score-value').innerText = score;
                document.getElementById('res-sync').innerText = isApto ? "APROBADO" : "REPROBADO";

                document.getElementById('res-msg').innerHTML = isApto ?
                    "Competencia legal acreditada. Sincronía con la Matriz exitosa." :
                    `Fallo en la resolución. Principal vector de error: <span style="color:var(--critical)">${vector}</span>`;

                const status = document.getElementById('res-status');
                status.innerText = isApto ? "RESOLUCIÓN_FIRME" : "INSUFICIENCIA_PROCESAL";
                status.style.color = isApto ? "#00ff00" : "var(--critical)";

                document.body.className = isApto ? 'state-success' : 'state-critical';

                // Configurar botón de salida
                const btn = document.querySelector('.btn-terminal');
                btn.innerText = "REGISTRAR_Y_SALIR";
                btn.onclick = () => this.finalizarYEnviar();
            },

            async finalizarYEnviar() {
                const btn = document.querySelector('.btn-terminal');
                btn.innerText = "⚡ SINCRONIZANDO...";
                btn.disabled = true;

                if (this.logPendiente) {
                    const API_URL = "https://script.google.com/macros/s/AKfycbz35P_r0wzGNWt6HnbwfiKwrT8rB4smorJhaWA5ixt8qAu25-UKtfRkzFXbEnlhLqKWkQ/exec";
                    try {
                        await fetch(API_URL, {
                            method: 'POST',
                            mode: 'no-cors',
                            keepalive: true,
                            headers: { 'Content-Type': 'text/plain' },
                            body: JSON.stringify(this.logPendiente)
                        });
                    } catch (e) { console.warn("Error de enlace"); }
                }

                setTimeout(() => { window.location.href = "index.html"; }, 800);
            }
        };

        window.onload = () => Examen.init();
    </script>

</body>

</html>
