<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA 9001 - JUICIO FINAL</title>
    <style>
        :root {
            --bg: #000;
            --panel: #050505;
            --accent: #ffffff;
            --critical: #ff0000;
            --text: #fff;
            --dim: #333;
        }

        * {
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 8px solid var(--dim);
            padding: 1rem;
            transition: border-color 0.3s ease, background-color 0.3s ease;
        }


        /* Cuando el tiempo es menor a 4, el borde se vuelve rojo */
        body.state-critical {
            border-color: var(--critical) !important;
            /* Opcional: un leve resplandor para aumentar la presión */
            box-shadow: inset 0 0 15px rgba(255, 0, 0, 0.1);
        }

        /* Efecto Escáner */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 255, 255, 0.05);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        header {
            padding: 15px 30px;
            background: var(--panel);
            border-bottom: 1px solid var(--dim);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .score-panel {
            display: flex;
            justify-content: center;
            gap: 50px;
            padding: 15px;
            background: #080808;
            border-bottom: 1px solid var(--dim);
        }

        .stat-label {
            font-size: 0.6rem;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
        }

        .timer-container {
            width: 100%;
            height: 4px;
            background: #111;
        }

        #timer-bar {
            height: 100%;
            background: var(--accent);
            width: 100%;
            transition: width 1s linear;
        }

        .main-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            /* Reducido para mejor escala en móvil */
            text-align: center;
            /* El borde ahora vive aquí */
            border: 8px solid var(--dim);
            margin: 1rem;
            transition: border-color 0.4s ease;
            overflow-y: auto;
            /* Permite scroll interno si el contenido crece */
        }

        #ia-status {
            font-size: 0.75rem;
            color: var(--accent);
            letter-spacing: 2px;
        }

        #question-text {
            font-size: 1.6rem;
            max-width: 850px;
            margin-bottom: 40px;
            font-weight: bold;
        }

        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 750px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--text);
            padding: 22px;
            font-size: 0.9rem;
            /*transition: 0.1s;*/
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--text);
            color: #000;
        }

        /* --- ESTILOS DEL RESULTADO (EL CARTEL QUE FALTA) --- */
        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.98);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .result-box {
            width: 100%;
            max-width: 500px;
            background: #050505;
            border: 1px solid var(--dim);
        }

        .result-header {
            background: #111;
            padding: 10px;
            font-size: 0.6rem;
            color: var(--dim);
            border-bottom: 1px solid var(--dim);
            text-align: center;
            letter-spacing: 2px;
        }

        .result-content {
            padding: 30px;
            text-align: center;
        }

        .res-data {
            text-align: left;
            font-size: 0.75rem;
            background: #080808;
            padding: 15px;
            border: 1px solid #111;
            margin: 20px 0;
            line-height: 1.8;
        }

        .text-success {
            color: #00ff00;
        }

        .text-fail {
            color: #ff0000;
        }

        .btn-terminal {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
        }

        /* Estados de Borde Dinámicos aplicados al main */
        .main-display.state-warning {
            border-color: var(--warning);
        }

        .main-display.state-critical {
            border-color: var(--critical);
        }

        .main-display.state-stable {
            border-color: var(--dim);
        }

        /* Opcional: Que la barra de vigencia también cambie de color automáticamente */
        .state-stable #stability-bar {
            background: var(--safe);
        }

        .state-warning #stability-bar {
            background: var(--warning);
        }

        .state-critical #stability-bar {
            background: var(--critical);
        }

        /* Efecto Shake (Vibración de Error) */
        .fx-shake {
            animation: shake 0.4s cubic-bezier(.36, .07, .19, .97) both;
        }

        @keyframes shake {

            10%,
            90% {
                transform: translate3d(-1px, 0, 0);
            }

            20%,
            80% {
                transform: translate3d(2px, 0, 0);
            }

            30%,
            50%,
            70% {
                transform: translate3d(-4px, 0, 0);
            }

            40%,
            60% {
                transform: translate3d(4px, 0, 0);
            }
        }

        body {
            padding: 0;
            /* Eliminamos el padding para ganar espacio */
            border-width: 4px;
            /* Borde más fino para pantallas pequeñas */
        }

        header {
            padding: 10px 20px;
            font-size: 0.65rem;
            background: #000;
            border-bottom: 1px solid var(--dim);
        }

        /* HUD MONITOREO COMPACTO */
        .hud-monitor {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 20px;
            background: #050505;
            border-bottom: 1px solid #111;
            min-height: 40px;
        }

        .hud-stats {
            display: flex;
            gap: 20px;
        }

        .hud-item {
            display: flex;
            align-items: baseline;
            gap: 8px;
        }

        .hud-label {
            font-size: 0.5rem;
            color: var(--dim);
        }

        .hud-value {
            font-size: 1.1rem;
            font-weight: bold;
            font-family: monospace;
        }

        #ia-status {
            font-size: 0.65rem;
            letter-spacing: 1px;
            color: var(--accent);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 50%;
        }

        /* ÁREA DE JUEGO ADAPTABLE */
        .main-display {
            flex: 1;
            padding: 20px;
            /* Reducido de 40px */
            justify-content: flex-start;
            /* Empieza desde arriba en móviles */
            margin-top: 20px;
        }

        #question-text {
            font-size: 1.2rem;
            /* Más pequeño para que quepa todo */
            margin-bottom: 25px;
            line-height: 1.3;
        }

        /* GRID RESPONSIVO */
        .options-grid {
            gap: 10px;
        }

        .btn {
            padding: 15px;
            /* Reducido para que quepan 4 botones en pantalla */
            font-size: 0.8rem;
        }

        /* MEDIA QUERIES PARA MÓVIL EXTREMO */
        @media (max-width: 480px) {
            body {
                border-width: 2px;
            }

            header {
                padding: 8px 12px;
            }

            .hud-monitor {
                padding: 5px 12px;
            }

            .hud-value {
                font-size: 1rem;
            }

            #question-text {
                font-size: 1rem;
            }

            .btn {
                padding: 12px;
                font-size: 0.75rem;
            }

            .hud-item:first-child {
                display: none;
            }

            /* Ocultamos Puntos en pantallas mini si es necesario */
        }
    </style>
    </style>
</head>

<body>
    <header>
        <div class="sys-brand">SYS_9001 // IA:TEST</div>
        <div id="q-count">PREGUNTA: 01/20</div>
    </header>

    <div class="hud-monitor">
        <div id="ia-status">ESPERANDO RESPUESTA...</div>
        <div class="hud-stats">
            <div class="hud-item">
                <span class="hud-label">PTS</span>
                <span id="current-score" class="hud-value">00</span>
            </div>
            <div class="hud-item">
                <span class="hud-label">T-MIN</span>
                <span id="seconds" class="hud-value">10</span>
            </div>
        </div>
    </div>

    <div class="timer-container">
        <div id="timer-bar"></div>
    </div>

    <main class="main-display">
        <div id="question-text">Cargando...</div>
        <div id="options-container" class="options-grid"></div>
    </main>

    <div id="result-overlay">
        <div class="result-box">
            <div class="result-header">REPORTE_FINAL_SISTEMA_9001</div>
            <div class="result-content">
                <h1 id="res-status">ANALIZANDO...</h1>
                <div class="res-data">
                    <p>IDENTIFICACIÓN: <span id="res-id">POSTULANTE_9001</span></p>
                    <p>CALIFICACIÓN FINAL: <span id="res-score-value">00</span></p>
                    <p>ESTADO: <span id="res-sync">ERROR</span></p>
                </div>
                <div id="res-msg" style="font-size: 0.85rem; color: #888; margin-bottom: 25px;"></div>
                <button class="btn-terminal" onclick="location.href='index.html'">SALIR_DEL_SISTEMA</button>
            </div>
        </div>
    </div>

    <script>
    // 1. OBJETO ANALISTA (GESTIÓN HÍBRIDA: HISTÓRICO + SESIÓN ACTUAL)
    const Analista = {
        sesionActual: { ok: 0, err: 0, detalles: [] },

        registrar(macro, micro, esCorrecto, motivo = "") {
            // A. Registro en LocalStorage (Mapa de Calor persistente)
            let stats = JSON.parse(localStorage.getItem('9001_HEATMAP')) || {};
            if (!stats[macro]) stats[macro] = {};
            if (!stats[macro][micro]) stats[macro][micro] = { ok: 0, err: 0 };

            if (esCorrecto) stats[macro][micro].ok++;
            else stats[macro][micro].err++;
            localStorage.setItem('9001_HEATMAP', JSON.stringify(stats));

            // B. Registro de Instancia (Para el Sheet de investigación)
            if (esCorrecto) {
                this.sesionActual.ok++;
            } else {
                this.sesionActual.err++;
                const errorID = motivo || `${macro}: ${micro}`;
                if (!this.sesionActual.detalles.includes(errorID)) {
                    this.sesionActual.detalles.push(errorID);
                }
            }
        },

        obtenerReporteSesion() {
            const fallos = this.sesionActual.detalles.join(' | ') || 'NINGUNO';
            return `ERRORES_EXAMEN: [${fallos}] || TOTAL_ERR: ${this.sesionActual.err} || ACERTADOS: ${this.sesionActual.ok}`;
        }
    };

    const SistemaPersistencia = {
        guardarPuntaje(categoria, puntaje) {
            try {
                let historial = JSON.parse(localStorage.getItem(`9001_${categoria}`)) || [];
                historial.push({
                    puntos: puntaje,
                    fecha: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                });
                historial.sort((a, b) => b.puntos - a.puntos);
                localStorage.setItem(`9001_${categoria}`, JSON.stringify(historial.slice(0, 5)));
            } catch (e) { console.error("Error persistencia:", e); }
        }
    };

    const DB_LEGAL = {
        circunscripciones: {
            "1RA CIRCUNSCRIPCIÓN": ["Ciudad", "Maipú", "Las Heras", "Guaymallén", "Godoy Cruz", "Luján", "Lavalle"],
            "2DA CIRCUNSCRIPCIÓN": ["San Rafael", "General Alvear", "Malargüe"],
            "3RA CIRCUNSCRIPCIÓN": ["San Martín", "Rivadavia", "Junín", "Santa Rosa", "La Paz"],
            "4TA CIRCUNSCRIPCIÓN": ["Tunuyán", "Tupungato", "San Carlos"]
        },
        competencias: {
            "CIVIL Y COMERCIAL": ["Responsabilidad civil (excede 20 JUS)", "Acciones reales y posesorias", "Contratos civiles y comerciales", "Sucesiones", "Amparos", "Ejecución de resoluciones judiciales", "Consumo (excede 5 JUS)"],
            "PAZ LETRADO": ["Desalojos (locación, comodato, usufructo)", "Procesos de estructura monitoria", "Responsabilidad civil (hasta 20 JUS)", "Consumo (hasta 5 JUS)", "Pequeñas causas (hasta 5 JUS)"]
        }
    };

    const Motores = {
        mazoCircun: [], mazosFuero: {}, fuerosOrden: ["CIVIL Y COMERCIAL", "PAZ LETRADO"],
        prepararMazos() {
            if (this.mazoCircun.length === 0) {
                Object.entries(DB_LEGAL.circunscripciones).forEach(([llave, valores]) => {
                    valores.forEach(v => this.mazoCircun.push({ valor: v, llave: llave }));
                });
                this.mazoCircun.sort(() => Math.random() - 0.5);
            }
            this.fuerosOrden.forEach(f => {
                if (!this.mazosFuero[f] || this.mazosFuero[f].length === 0) {
                    this.mazosFuero[f] = [...DB_LEGAL.competencias[f]].sort(() => Math.random() - 0.5);
                }
            });
        },
        shuffle(array) { return array.sort(() => Math.random() - 0.5); },
        obtenerDesafio(index) {
            this.prepararMazos();
            if (index % 2 === 0) {
                const p = this.mazoCircun.pop() || {valor: "Ciudad", llave: "1RA CIRCUNSCRIPCIÓN"};
                const llaves = Object.keys(DB_LEGAL.circunscripciones);
                const qLlave = llaves[Math.floor(Math.random() * llaves.length)];
                const s = this.mazoCircun[Math.floor(Math.random() * this.mazoCircun.length)] || p;
                const v1Ok = (p.llave === qLlave), v2Ok = (s.llave === qLlave);
                const a = (v1Ok && v2Ok) ? "AMBOS SON CORRECTOS" : (!v1Ok && !v2Ok) ? "NINGUNO ES CORRECTO" : (v1Ok && !v2Ok) ? "SÓLO EL PRIMERO ES CORRECTO" : "SÓLO EL SEGUNDO ES CORRECTO";
                return {
                    q: `¿Pertenecen ${p.valor.toUpperCase()} y ${s.valor.toUpperCase()} a la ${qLlave}?`,
                    a: a, opts: ["AMBOS SON CORRECTOS", "NINGUNO ES CORRECTO", "SÓLO EL PRIMERO ES CORRECTO", "SÓLO EL SEGUNDO ES CORRECTO"],
                    tipo: 'CIRCUNSCRIPCIÓN', subtipo: p.valor
                };
            } else {
                const fuero = this.fuerosOrden[Math.floor(Math.random() * this.fuerosOrden.length)];
                const proceso = this.mazosFuero[fuero].pop();
                return {
                    q: `El proceso de ${proceso.toUpperCase()} es competencia de:`,
                    a: fuero, opts: this.shuffle(["CIVIL Y COMERCIAL", "PAZ LETRADO", "JUSTICIA DE FAMILIA", "TRIBUTARIO Y CONCURSAL"]),
                    tipo: 'COMPETENCIA', subtipo: proceso
                };
            }
        }
    };

    const Examen = {
        score: 0, qIndex: 0, timeLeft: 10, timerInt: null, timestampStart: null, logPendiente: null,

        init() {
            this.timestampStart = new Date().toISOString();
            this.render();
        },

        render() {
            if (this.qIndex >= 20) { this.finish(); return; }
            clearInterval(this.timerInt);
            this.timeLeft = 10;
            this.current = Motores.obtenerDesafio(this.qIndex);
            
            document.getElementById('q-count').innerText = `PREGUNTA: ${String(this.qIndex + 1).padStart(2, '0')}/20`;
            document.getElementById('question-text').innerText = this.current.q;
            document.getElementById('options-container').innerHTML = this.current.opts.map(o =>
                `<button class="btn" onclick="Examen.answer('${o}')">${o}</button>`
            ).join('');
            this.startTimer();
        },

        answer(val) {
            clearInterval(this.timerInt);
            const esCorrecto = (val === this.current.a);
            const mainDisplay = document.querySelector('.main-display');

            if (val === null) {
                this.score -= 3;
                Analista.registrar(this.current.tipo, this.current.subtipo, false, "TIEMPO_AGOTADO");
                this.status("SILENCIO PENALIZADO (-3)", "var(--critical)");
            } else if (esCorrecto) {
                this.score += 1;
                Analista.registrar(this.current.tipo, this.current.subtipo, true);
                this.status("CORRECTO (+1)", "#00ff00");
            } else {
                this.score -= 2;
                Analista.registrar(this.current.tipo, this.current.subtipo, false);
                this.status("ERROR (-2)", "var(--critical)");
            }

            document.getElementById('current-score').innerText = this.score;
            document.getElementById('options-container').innerHTML = "";
            this.qIndex++;
            setTimeout(() => this.render(), 600);
        },

        startTimer() {
            this.timerInt = setInterval(() => {
                this.timeLeft--;
                this.updateTimerUI();
                if (this.timeLeft <= 0) this.answer(null);
            }, 1000);
        },

        updateTimerUI() {
            document.getElementById('seconds').innerText = this.timeLeft;
            const bar = document.getElementById('timer-bar');
            if (bar) bar.style.width = (this.timeLeft * 10) + "%";
        },

        status(msg, color) {
            const s = document.getElementById('ia-status');
            if (s) { s.innerText = msg; s.style.color = color; }
        },

        finish() {
            clearInterval(this.timerInt);
            const isApto = this.score >= 8;
            const session = localStorage.getItem('meg_session') || "NO_SESSION";

            this.logPendiente = {
                uid_hash: localStorage.getItem('meg_uid') || "ANON_USER",
                session_token: session,
                timestamp_start: this.timestampStart,
                protocolo: 'EXAMEN_FINAL_9001',
                score: this.score,
                error_vector: Analista.obtenerReporteSesion(),
                ua_client: navigator.userAgent
            };

            this.showResult(this.score, isApto);
        },

        showResult(score, isApto) {
            document.getElementById('result-overlay').style.display = 'flex';
            document.getElementById('res-id').innerText = this.logPendiente.session_token;
            document.getElementById('res-score-value').innerText = score;
            document.getElementById('res-sync').innerText = isApto ? "APROBADO" : "REPROBADO";
            
            SistemaPersistencia.guardarPuntaje('examen', score);
            const btn = document.querySelector('.btn-terminal');
            btn.onclick = () => this.finalizarYEnviar();
        },

        finalizarYEnviar() {
            const btn = document.querySelector('.btn-terminal');
            btn.innerText = "⚡ REGISTRANDO...";
            btn.disabled = true;

            if (this.logPendiente) {
                const API_URL = "https://script.google.com/macros/s/AKfycbz35P_r0wzGNWt6HnbwfiKwrT8rB4smorJhaWA5ixt8qAu25-UKtfRkzFXbEnlhLqKWkQ/exec";
                const blob = new Blob([JSON.stringify(this.logPendiente)], { type: 'text/plain;charset=UTF-8' });
                navigator.sendBeacon ? navigator.sendBeacon(API_URL, blob) : fetch(API_URL, { method: 'POST', body: blob, mode: 'no-cors', keepalive: true });
            }
            setTimeout(() => { window.location.href = "index.html"; }, 400);
        }
    };

    window.onload = () => Examen.init();
</script>

</body>

</html>
