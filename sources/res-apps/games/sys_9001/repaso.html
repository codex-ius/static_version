<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PROTOCOLO 01: SESIÓN DE REPASO</title>
    <style>
        :root {
            --bg: #000;
            --panel: #050505;
            --accent: #ffffff;
            --safe: #00d4ff;
            /* Cian - Estabilidad */
            --warning: #ff9800;
            /* Naranja - Degradación */
            --critical: #ff0000;
            /* Rojo - Fallo */
            --text: #fff;
            --dim: #333;
        }

        * {
            box-sizing: border-box;
            cursor: crosshair;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Escáner Biométrico */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(0, 212, 255, 0.05);
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        @keyframes scan {
            0% {
                top: 0;
            }

            100% {
                top: 100%;
            }
        }

        header {
            padding: 15px 25px;
            background: var(--panel);
            border-bottom: 1px solid var(--dim);

        }

        .sys-info {
            font-size: 0.7rem;
            letter-spacing: 3px;
            font-weight: bold;
        }

        .session-timer {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--safe);
        }

        #ia-console {
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            text-transform: uppercase;
            background: #080808;
            border-bottom: 1px solid #111;
            letter-spacing: 1px;
            padding: 1rem;
        }

        .main-display {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            /* Reducido para mejor escala en móvil */
            text-align: center;
            /* El borde ahora vive aquí */
            border: 8px solid var(--dim);
            margin: 1rem;
            transition: border-color 0.4s ease;
            overflow-y: auto;
            /* Permite scroll interno si el contenido crece */
        }

        #prompt {
            font-size: 1.5rem;
            color: #fff;
            margin-bottom: 1rem;
            max-width: 850px;
            font-weight: bold;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 100%;
            max-width: 800px;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--dim);
            color: var(--text);
            padding: 1rem;
            cursor: pointer;
            /*font-size: 0.9rem;*/
            /*transition: 0.1s;*/
            text-transform: uppercase;
        }

        .btn:hover {
            background: var(--text);
            color: #000;
        }

        /* Barra de Estabilidad de Núcleo */
        .stability-footer {
            height: 8px;
            background: #111;
            width: 100%;
            position: relative;
        }

        #stability-bar {
            height: 100%;
            background: var(--safe);
            width: 100%;
            transition: width 0.3s linear;
        }

        /* Estados de Borde Dinámicos */
        .state-warning {
            border-color: var(--warning);
        }

        .state-critical {
            border-color: var(--critical);
        }

        #result-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .result-box {
            width: 100%;
            max-width: 450px;
            background: #050505;
            border: 1px solid var(--dim);
        }

        .result-header {
            background: #111;
            padding: 10px;
            font-size: 0.6rem;
            color: var(--dim);
            border-bottom: 1px solid var(--dim);
            text-align: center;
            letter-spacing: 2px;
        }

        .result-content {
            padding: 30px;
            text-align: center;
        }

        #res-status {
            font-size: 1.1rem;
            letter-spacing: 3px;
            margin-bottom: 20px;
        }

        .res-data {
            text-align: left;
            font-size: 0.7rem;
            background: #080808;
            padding: 15px;
            border: 1px solid #111;
            margin-bottom: 20px;
            line-height: 2;
        }

        .res-msg-text {
            font-size: 0.8rem;
            color: #777;
            margin-bottom: 25px;
        }

        .btn-terminal {
            background: #fff;
            color: #000;
            border: none;
            padding: 15px;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
        }

        /* Colores dinámicos basados en la clase del body */
        /*.state-stable #status-text { color: var(--safe); }
.state-warning #status-text { color: var(--warning); }
.state-critical #status-text { color: var(--critical); }*/

        /* Estados de Borde Dinámicos aplicados al main */
        .main-display.state-warning {
            border-color: var(--warning);
        }

        .main-display.state-critical {
            border-color: var(--critical);
        }

        .main-display.state-stable {
            border-color: var(--dim);
        }

        /* Opcional: Que la barra de vigencia también cambie de color automáticamente */
        .state-stable #stability-bar {
            background: var(--safe);
        }

        .state-warning #stability-bar {
            background: var(--warning);
        }

        .state-critical #stability-bar {
            background: var(--critical);
        }
    </style>
</head>

<body>

    <header>
        <div class="sys-info">SYS_9001 // REPASO</div>
        <div id="timer" class="session-timer">25:00</div>
        <div id="status-text" style="font-size: 0.6rem;">ESTADO: ESTABLE</div>
    </header>

    <div id="ia-console">SISTEMA INICIADO. MANTENGA FLUJO DE RESPUESTA CONSTANTE.</div>
    <div class="stability-footer">
        <div id="stability-bar"></div>
    </div>
    <main class="main-display">
        <div id="prompt">INICIALIZANDO UNIDAD...</div>
        <div id="options-grid" class="options"></div>
    </main>


    <div id="result-overlay">
        <div class="result-box">
            <div class="result-header">REPORTE_DE_SINCRONIZACIÓN</div>
            <div class="result-content">
                <h1 id="res-status">SESIÓN COMPLETADA</h1>
                <div class="res-data">
                    <p>USUARIO: <span id="res-core">9001_MENDOZA</span></p>
                    <p>EFICIENCIA DE SESIÓN: <span id="res-efficiency">0%</span></p>
                    <p>ESTADO FINAL: <span id="res-sync">DESCONECTADO</span></p>
                </div>
                <div id="res-msg" class="res-msg-text">
                    Los datos han sido persistidos en la memoria local.
                </div>
                <button class="btn-final" onclick="Protocolo.finalizarYEnviar()">RETORNAR AL NODO CENTRAL</button>
            </div>
        </div>
    </div>

    <script>
        // 1. OBJETO ANALISTA (GESTIÓN HÍBRIDA: HISTÓRICO + SESIÓN ACTUAL)
        const Analista = {
            // Memoria volátil: Solo dura lo que dure la pestaña abierta
            sesionActual: { ok: 0, err: 0, detalles: [] },

            registrar(macro, micro, esCorrecto) {
                // A. REGISTRO HISTÓRICO (LocalStorage)
                let stats = JSON.parse(localStorage.getItem('9001_HEATMAP')) || {};
                if (!stats[macro]) stats[macro] = {};
                if (!stats[macro][micro]) stats[macro][micro] = { ok: 0, err: 0 };

                if (esCorrecto) stats[macro][micro].ok++;
                else stats[macro][micro].err++;
                localStorage.setItem('9001_HEATMAP', JSON.stringify(stats));

                // B. REGISTRO DE INSTANCIA (Para el Sheet - Inmune a borrados de caché)
                if (esCorrecto) {
                    this.sesionActual.ok++;
                } else {
                    this.sesionActual.err++;
                    // Guardamos el nombre del error si no estaba ya en la lista de esta sesión
                    const errorID = `${macro}: ${micro}`;
                    if (!this.sesionActual.detalles.includes(errorID)) {
                        this.sesionActual.detalles.push(errorID);
                    }
                }
            },

            obtenerReporteSesion() {
                // Este es el dato que irá al Sheet: puro, fresco y de hoy.
                const fallos = this.sesionActual.detalles.join(' | ') || 'NINGUNO';
                return `ERRORES_SESION: [${fallos}] || TOTAL_ERR: ${this.sesionActual.err} || ACERTADOS: ${this.sesionActual.ok}`;
            }
        };

        const SistemaPersistencia = {
            guardarPuntaje(categoria, puntaje) {
                try {
                    let historial = JSON.parse(localStorage.getItem(`9001_${categoria}`)) || [];
                    historial.push({
                        puntos: puntaje,
                        fecha: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
                    });
                    historial.sort((a, b) => b.puntos - a.puntos);
                    localStorage.setItem(`9001_${categoria}`, JSON.stringify(historial.slice(0, 5)));
                } catch (e) { console.error("Error persistencia:", e); }
            }
        };

        const DB_LEGAL = {
            circunscripciones: {
                "1RA CIRCUNSCRIPCIÓN": ["Ciudad", "Maipú", "Las Heras", "Guaymallén", "Godoy Cruz", "Luján", "Lavalle"],
                "2DA CIRCUNSCRIPCIÓN": ["San Rafael", "General Alvear", "Malargüe"],
                "3RA CIRCUNSCRIPCIÓN": ["San Martín", "Rivadavia", "Junín", "Santa Rosa", "La Paz"],
                "4TA CIRCUNSCRIPCIÓN": ["Tunuyán", "Tupungato", "San Carlos"]
            },
            competencias: {
                "CIVIL Y COMERCIAL": ["Responsabilidad civil (excede 20 JUS)", "Acciones reales y posesorias", "Contratos civiles y comerciales", "Sucesiones", "Amparos", "Ejecución de resoluciones judiciales", "Consumo (excede 5 JUS)"],
                "PAZ LETRADO": ["Desalojos (locación, comodato, usufructo)", "Procesos de estructura monitoria", "Responsabilidad civil (hasta 20 JUS)", "Consumo (hasta 5 JUS)", "Pequeñas causas (hasta 5 JUS)"]
            }
        };

        const Motores = {
            mazoCircun: [], mazosFuero: {}, indiceFuero: 0, fuerosOrden: ["CIVIL Y COMERCIAL", "PAZ LETRADO"],
            prepararMazos() {
                if (this.mazoCircun.length === 0) {
                    Object.entries(DB_LEGAL.circunscripciones).forEach(([llave, valores]) => {
                        valores.forEach(v => this.mazoCircun.push({ valor: v, llave: llave }));
                    });
                    this.mazoCircun.sort(() => Math.random() - 0.5);
                }
                this.fuerosOrden.forEach(f => {
                    if (!this.mazosFuero[f] || this.mazosFuero[f].length === 0) {
                        this.mazosFuero[f] = [...DB_LEGAL.competencias[f]].sort(() => Math.random() - 0.5);
                    }
                });
            },
            shuffle(array) { return array.sort(() => Math.random() - 0.5); },
            obtenerCircunscripcion() {
                this.prepararMazos();
                const principal = this.mazoCircun.pop();
                const llavesTodas = Object.keys(DB_LEGAL.circunscripciones);
                const llavePregunta = llavesTodas[Math.floor(Math.random() * llavesTodas.length)];
                const comparador = this.mazoCircun[Math.floor(Math.random() * this.mazoCircun.length)] || principal;

                const v1Ok = (principal.llave === llavePregunta);
                const v2Ok = (comparador.llave === llavePregunta);
                let a = (v1Ok && v2Ok) ? "AMBOS SON CORRECTOS" : (!v1Ok && !v2Ok) ? "NINGUNO ES CORRECTO" : (v1Ok && !v2Ok) ? "SÓLO EL PRIMERO ES CORRECTO" : "SÓLO EL SEGUNDO ES CORRECTO";

                return {
                    q: `¿Se encuentran ${principal.valor.toUpperCase()} y ${comparador.valor.toUpperCase()} en la ${llavePregunta}?`,
                    a: a,
                    opts: ["AMBOS SON CORRECTOS", "NINGUNO ES CORRECTO", "SÓLO EL PRIMERO ES CORRECTO", "SÓLO EL SEGUNDO ES CORRECTO"],
                    tipo: 'CIRCUNSCRIPCIÓN', subtipo: principal.valor
                };
            },
            obtenerCompetencia() {
                this.prepararMazos();
                const fuero = this.fuerosOrden[this.indiceFuero];
                this.indiceFuero = (this.indiceFuero + 1) % this.fuerosOrden.length;
                const proceso = this.mazosFuero[fuero].pop();
                return {
                    q: `¿Competencia material para: ${proceso.toUpperCase()}?`,
                    a: fuero,
                    opts: this.shuffle(["CIVIL Y COMERCIAL", "PAZ LETRADO", "TRIBUTARIO", "CONCURSOS Y QUIEBRAS"]),
                    tipo: 'COMPETENCIA', subtipo: proceso
                };
            }
        };

        const Protocolo = {
            vigencia: 100, vicios: 0, qIndex: 0, tiempoSesion: 25 * 60,
            timestampStart: null, logPendiente: null,

            init() {
                this.timestampStart = new Date().toISOString();
                this.render();
                this.startTicker();
            },

            render() {
                const desafio = (this.qIndex % 2 === 0) ? Motores.obtenerCircunscripcion() : Motores.obtenerCompetencia();
                this.current = desafio;
                document.getElementById('prompt').innerText = desafio.q;
                document.getElementById('options-grid').innerHTML = desafio.opts.map(o =>
                    `<button class="btn" onclick="Protocolo.check('${o}')">${o}</button>`
                ).join('');
            },

            check(val) {
                const esCorrecto = (val === this.current.a);
                Analista.registrar(this.current.tipo, this.current.subtipo, esCorrecto);

                if (esCorrecto) {
                    this.vicios = 0;
                    this.vigencia = Math.min(100, this.vigencia + 8);
                    this.logIA("PROCEDIMIENTO VÁLIDO.", "var(--safe)");
                } else {
                    this.vicios++;
                    this.vigencia -= 15;
                    this.logIA(`ERROR DETECTADO. SINCRONIZACIÓN AL ${Math.max(0, Math.floor(this.vigencia))}%`, "var(--critical)");
                }
                this.qIndex++;
                this.updateUI();
                if (this.vicios < 3 && this.vigencia > 0) setTimeout(() => this.render(), 300);
            },

            updateUI() {
                const bar = document.getElementById('stability-bar');
                if (bar) bar.style.width = `${Math.max(0, this.vigencia)}%`;
                if (this.vigencia <= 0 || this.vicios >= 3) { this.showResult(false); return; }
                const statusLabel = document.getElementById('status-text');
                const mainDisplay = document.querySelector('.main-display');
                if (this.vigencia < 35) {
                    mainDisplay.className = 'main-display state-critical';
                    statusLabel.innerText = "ESTADO: DESINCRONIZADO";
                } else {
                    mainDisplay.className = 'main-display state-stable';
                    statusLabel.innerText = "ESTADO: VIGENTE";
                }
            },

            showResult(success) {
                clearInterval(this.ticker);
                const finalEff = Math.max(0, Math.floor(this.vigencia));

                // PREPARACIÓN DE LOG PARA EL SHEET (Solo esta sesión)
                this.logPendiente = {
                    uid_hash: localStorage.getItem('meg_uid') || "ANON_USER",
                    session_token: localStorage.getItem('meg_session') || "NO_SESSION",
                    timestamp_start: this.timestampStart,
                    protocolo: 'REPASO_9001',
                    score: finalEff,
                    error_vector: Analista.obtenerReporteSesion(), // REPORTE DE SESIÓN PURA
                    ua_client: navigator.userAgent
                };

                SistemaPersistencia.guardarPuntaje('repaso', finalEff);
                document.getElementById('result-overlay').style.display = 'flex';
                document.getElementById('res-core').innerText = this.logPendiente.session_token;
                document.getElementById('res-efficiency').innerText = finalEff + "%";
                document.getElementById('res-status').innerText = success ? "SINCRONIZADO" : "DESINCRONIZADO";
            },

            finalizarYEnviar() {
                const btn = document.querySelector('.btn-final');
                btn.innerText = "⚡ REGISTRANDO...";
                btn.disabled = true;

                if (this.logPendiente) {
                    const API_URL = "https://script.google.com/macros/s/AKfycbz35P_r0wzGNWt6HnbwfiKwrT8rB4smorJhaWA5ixt8qAu25-UKtfRkzFXbEnlhLqKWkQ/exec";
                    const payload = JSON.stringify(this.logPendiente);

                    // El secreto del sendBeacon: Usar el constructor de Blob explícito
                    const blob = new Blob([payload], { type: 'text/plain;charset=UTF-8' });

                    if (navigator.sendBeacon) {
                        navigator.sendBeacon(API_URL, blob);
                    } else {
                        fetch(API_URL, { method: 'POST', body: blob, mode: 'no-cors', keepalive: true });
                    }
                }
                setTimeout(() => { window.location.href = "index.html"; }, 400);
            },

            startTicker() {
                this.ticker = setInterval(() => {
                    this.vigencia -= 0.25;
                    this.tiempoSesion--;
                    const min = Math.floor(this.tiempoSesion / 60);
                    const sec = this.tiempoSesion % 60;
                    const timerLabel = document.getElementById('timer');
                    if (timerLabel) timerLabel.innerText = `${min}:${sec < 10 ? '0' : ''}${sec}`;
                    if (this.tiempoSesion <= 0) this.showResult(true);
                    this.updateUI();
                }, 1000);
            },

            logIA(msg, color) {
                const consoleBox = document.getElementById('ia-console');
                if (consoleBox) { consoleBox.innerText = msg; consoleBox.style.color = color; }
            }
        };

        window.onload = () => Protocolo.init();
    </script>
</body>

</html>
