<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>MEG // GENERADOR DE LISTA BLANCA</title>
    <style>
        body { background: #000; color: #00d4ff; font-family: monospace; padding: 20px; }
        textarea { width: 100%; height: 150px; background: #050505; color: #fff; border: 1px solid #333; margin: 10px 0; padding: 10px; }
        button { background: #00d4ff; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .hash-list { color: #888; font-size: 0.8rem; border: 1px solid #111; padding: 10px; margin-top: 20px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <h2>MEG_SYSTEM: GENERADOR DE HASHES</h2>
    <p>Pegue los legajos (uno por línea):</p>
    <textarea id="legajosInput" placeholder="Ejemplo:&#10;12345&#10;67890"></textarea>
    <button onclick="procesar()">GENERAR LISTA PARA APPS SCRIPT</button>

    <h3>RESULTADO (Copiar y pegar en LISTA_BLANCA del Script):</h3>
    <div id="resultado" class="hash-list"></div>

    <script>
        const SALT = "MZA_CODEX_2026";

        async function generarHash(legajo) {
            const msgUint8 = new TextEncoder().encode(legajo.trim() + SALT);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        async function procesar() {
            const input = document.getElementById('legajosInput').value;
            const legajos = input.split('\n').filter(l => l.trim() !== "");
            const resultadoDiv = document.getElementById('resultado');
            resultadoDiv.innerText = "PROCESANDO...";

            let hashes = [];
            for (let l of legajos) {
                const h = await generarHash(l);
                hashes.push(`"${h}"`);
            }

            resultadoDiv.innerText = "[\n  " + hashes.join(",\n  ") + "\n]";
        }
    </script>
</body>
</html>
